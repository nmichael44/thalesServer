name: Scala CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: thalesdb
          POSTGRES_USER: thalesuser
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Server
        uses: actions/checkout@v4

      - name: Checkout Protocol
        uses: actions/checkout@v4
        with:
          repository: nmichael44/thalesProtocol
          path: thalesProtocol

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'

      - name: Set up SBT
        uses: sbt/setup-sbt@v1

      - name: Allow binding to privileged ports (like 443)
        run: sudo sysctl -w net.ipv4.ip_unprivileged_port_start=0

      - name: Generate Self-Signed Keystore for Testing
        run: |
          mkdir -p certs
          keytool -genkeypair \
            -alias thales \
            -keyalg RSA \
            -keysize 2048 \
            -storetype PKCS12 \
            -keystore certs/keystore.p12 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=localhost, OU=Test, O=Test, L=Test, S=Test, C=US" \
            -validity 365

      - name: Publish thalesProtocol Locally
        run: |
          cd thalesProtocol
          sbt pl

      - name: Initialize PostgreSQL Schema
        run: |
          set -e
          docker exec ${{ job.services.postgres.id }} psql -U thalesuser -d thalesdb -c "CREATE SCHEMA thalesSchema AUTHORIZATION thalesuser;"
          docker exec ${{ job.services.postgres.id }} psql -U thalesuser -d thalesdb -c "ALTER ROLE thalesuser SET search_path TO thalesSchema;"

      - name: Cache SBT target
        uses: actions/cache@v4
        with:
          path: |
            target/
            project/target/
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Run compile and tests
        run: sbt test
        env:
          DB_SERVER_HOST: localhost
          DB_SERVER_PORT: 5432
          DB_USERNAME: thalesuser
          DB_USERNAME_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: thalesdb
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_FILE: certs/keystore.p12
